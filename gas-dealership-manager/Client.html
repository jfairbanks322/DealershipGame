<script>
  const state = {
    auth: JSON.parse(localStorage.getItem("dm-google-auth") || "null"),
    data: null
  };

  const refs = {
    setupMessage: document.getElementById("setup-message"),
    refreshButton: document.getElementById("refresh-button"),
    studentRegisterForm: document.getElementById("student-register-form"),
    studentLoginForm: document.getElementById("student-login-form"),
    teacherLoginForm: document.getElementById("teacher-login-form"),
    teacherPanel: document.getElementById("teacher-panel"),
    studentPanel: document.getElementById("student-panel"),
    teacherLogout: document.getElementById("teacher-logout"),
    studentLogout: document.getElementById("student-logout"),
    toggleSessionButton: document.getElementById("toggle-session-button"),
    sessionStatus: document.getElementById("session-status"),
    teacherCurrentRound: document.getElementById("teacher-current-round"),
    teacherStudents: document.getElementById("teacher-students"),
    teacherHistory: document.getElementById("teacher-history"),
    presetSelect: document.getElementById("preset-select"),
    presetPreview: document.getElementById("preset-preview"),
    launchForm: document.getElementById("launch-form"),
    customHeadline: document.getElementById("custom-headline"),
    customBody: document.getElementById("custom-body"),
    studentName: document.getElementById("student-name"),
    studentSummary: document.getElementById("student-summary"),
    studentStaff: document.getElementById("student-staff"),
    studentRound: document.getElementById("student-round"),
    leaderboard: document.getElementById("leaderboard"),
    toast: document.getElementById("toast")
  };

  refs.refreshButton.addEventListener("click", bootstrap);
  refs.studentRegisterForm.addEventListener("submit", (event) => handleAuth(event, "dmRegisterStudent"));
  refs.studentLoginForm.addEventListener("submit", (event) => handleAuth(event, "dmLoginStudent"));
  refs.teacherLoginForm.addEventListener("submit", handleTeacherLogin);
  refs.teacherLogout.addEventListener("click", logout);
  refs.studentLogout.addEventListener("click", logout);
  refs.toggleSessionButton.addEventListener("click", toggleSession);
  refs.launchForm.addEventListener("submit", launchRound);
  refs.presetSelect.addEventListener("change", renderPresetPreview);
  refs.studentRound.addEventListener("click", handleStudentRoundClick);

  bootstrap();
  setInterval(() => {
    if (shouldPauseRefresh()) {
      return;
    }
    bootstrap();
  }, 10000);

  function callServer(name, ...args) {
    return new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler((error) => reject(new Error(error && error.message ? error.message : "Google Apps Script request failed.")))
        [name](...args);
    });
  }

  async function bootstrap() {
    try {
      const data = await callServer("dmBootstrap", state.auth);
      state.data = data;
      render();
    } catch (error) {
      refs.setupMessage.textContent = error.message;
      showToast(error.message);
    }
  }

  async function handleAuth(event, method) {
    event.preventDefault();
    const form = event.currentTarget;
    const payload = Object.fromEntries(new FormData(form).entries());
    if (payload.username) {
      payload.username = normalizeUsername(payload.username);
      form.elements.username.value = payload.username;
    }
    try {
      const data = await callServer(method, payload);
      state.auth = data.auth;
      localStorage.setItem("dm-google-auth", JSON.stringify(state.auth));
      state.data = data;
      form.reset();
      render();
    } catch (error) {
      showToast(error.message);
    }
  }

  async function handleTeacherLogin(event) {
    event.preventDefault();
    const form = event.currentTarget;
    const payload = Object.fromEntries(new FormData(form).entries());
    try {
      const data = await callServer("dmLoginTeacher", payload);
      state.auth = data.auth;
      localStorage.setItem("dm-google-auth", JSON.stringify(state.auth));
      state.data = data;
      form.reset();
      render();
    } catch (error) {
      showToast(error.message);
    }
  }

  async function toggleSession() {
    try {
      state.data = await callServer("dmToggleSession", state.auth, !state.data.game.isOpen);
      render();
    } catch (error) {
      showToast(error.message);
    }
  }

  async function launchRound(event) {
    event.preventDefault();
    try {
      state.data = await callServer("dmLaunchRound", state.auth, {
        presetId: refs.presetSelect.value,
        headline: refs.customHeadline.value,
        body: refs.customBody.value
      });
      refs.customHeadline.value = "";
      refs.customBody.value = "";
      render();
    } catch (error) {
      showToast(error.message);
    }
  }

  async function handleStudentRoundClick(event) {
    const button = event.target.closest("[data-option-id]");
    if (!button) {
      return;
    }
    try {
      state.data = await callServer("dmSubmitChoice", state.auth, {
        optionId: button.dataset.optionId
      });
      render();
    } catch (error) {
      showToast(error.message);
    }
  }

  function logout() {
    state.auth = null;
    localStorage.removeItem("dm-google-auth");
    bootstrap();
  }

  function render() {
    refs.setupMessage.textContent = "Google Sheets storage is ready.";
    renderLeaderboard();
    renderTeacher();
    renderStudent();
  }

  function renderTeacher() {
    const isTeacher = state.auth && state.auth.role === "teacher";
    refs.teacherPanel.classList.toggle("hidden", !isTeacher);
    if (!isTeacher) {
      return;
    }

    refs.sessionStatus.textContent = state.data.game.isOpen ? "Session open" : "Session closed";
    refs.toggleSessionButton.textContent = state.data.game.isOpen ? "Close Session" : "Open Session";

    const currentPresetId = refs.presetSelect.value;
    refs.presetSelect.innerHTML = (state.data.presets || []).map((preset) => {
      return `<option value="${preset.id}">${escapeHtml(preset.category)}: ${escapeHtml(preset.headline)}</option>`;
    }).join("");
    if (currentPresetId && (state.data.presets || []).some((preset) => preset.id === currentPresetId)) {
      refs.presetSelect.value = currentPresetId;
    }
    renderPresetPreview();

    const admin = state.data.admin || { students: [], recentRounds: [], currentRound: null };
    refs.teacherCurrentRound.innerHTML = admin.currentRound
      ? `
          <strong>Live Round ${admin.currentRound.roundNumber}</strong>
          <p class="muted">${escapeHtml(admin.currentRound.headline)}</p>
          <p class="tiny">${escapeHtml(admin.currentRound.category)} · ${escapeHtml(admin.currentRound.pressure)} pressure · ${admin.currentRound.resolvedStudents}/${admin.currentRound.activeStudents} resolved</p>
        `
      : `<p class="muted">No live dealership event right now.</p>`;

    refs.teacherStudents.innerHTML = admin.students.length
      ? `<div class="mini-list">${
          admin.students.map((student) => `
            <div class="mini-card">
              <strong>${escapeHtml(student.displayName)}</strong>
              <div class="tiny">${escapeHtml(student.caseStatus)}${student.nodeTitle ? ` · ${escapeHtml(student.nodeTitle)}` : ""}</div>
              <div class="tiny">$${Number(student.sales).toFixed(0)} · Sat ${student.satisfaction} · Rep ${student.reputation}</div>
              <div class="tiny">Case: $${Number(student.caseTotals.sales).toFixed(0)} · ${student.caseTotals.satisfaction >= 0 ? "+" : ""}${student.caseTotals.satisfaction} sat · ${student.caseTotals.reputation >= 0 ? "+" : ""}${student.caseTotals.reputation} rep</div>
            </div>
          `).join("")
        }</div>`
      : `<p class="muted">No student accounts yet.</p>`;

    refs.teacherHistory.innerHTML = admin.recentRounds.length
      ? `<div class="mini-list">${
          admin.recentRounds.map((round) => `
            <div class="mini-card">
              <strong>Round ${round.roundNumber}: ${escapeHtml(round.category)}</strong>
              <div class="tiny">${escapeHtml(round.headline)}</div>
              <div class="tiny">${escapeHtml(round.pressure)} pressure · ${escapeHtml(round.status)}</div>
            </div>
          `).join("")
        }</div>`
      : `<p class="muted">No rounds launched yet.</p>`;
  }

  function renderPresetPreview() {
    if (!state.data || !state.data.presets || !state.data.presets.length || !refs.presetSelect.value) {
      refs.presetPreview.innerHTML = "<p class='muted'>No event chains loaded yet.</p>";
      return;
    }
    const preset = state.data.presets.find((item) => item.id === refs.presetSelect.value) || state.data.presets[0];
    refs.presetPreview.innerHTML = `
      <strong>${escapeHtml(preset.headline)}</strong>
      <p class="muted">${escapeHtml(preset.body)}</p>
      <p class="tiny">${escapeHtml(preset.category)} · ${escapeHtml(preset.pressure)} pressure</p>
    `;
  }

  function renderStudent() {
    const isStudent = state.auth && state.auth.role === "student" && state.data.user;
    refs.studentPanel.classList.toggle("hidden", !isStudent);
    if (!isStudent) {
      return;
    }

    refs.studentName.textContent = state.data.user.displayName;
    refs.studentSummary.textContent = `Sales: $${state.data.user.sales.toFixed(0)} · Satisfaction: ${state.data.user.satisfaction} · Reputation: ${state.data.user.reputation}`;
    refs.studentStaff.innerHTML = state.data.user.staff.map((member) => `
      <div class="staff-card">
        <strong>${escapeHtml(member.name)}</strong>
        <span class="tiny">${escapeHtml(member.title)} · ${escapeHtml(member.badge)}</span>
        <div class="tiny">Morale ${member.morale} · Trust ${member.trust}</div>
      </div>
    `).join("");

    const round = state.data.currentRound;
    if (!round || !round.caseFile) {
      refs.studentRound.innerHTML = `<p class="muted">No active dealership event right now.</p>`;
      return;
    }

    const caseFile = round.caseFile;
    const buttonHtml = caseFile.currentPhase === "consultant"
      ? caseFile.availableConsultants.map((consultant) => `
          <button data-option-id="${consultant.id}">${escapeHtml(consultant.name)}</button>
        `).join("")
      : caseFile.availableActions.map((option) => `
          <button data-option-id="${option.id}">${escapeHtml(option.label)}</button>
        `).join("");

    refs.studentRound.innerHTML = `
      <div>
        <p class="eyebrow">${escapeHtml(round.category)} · ${escapeHtml(round.pressure)} pressure</p>
        <h3>${escapeHtml(round.headline)}</h3>
        <p class="muted">${escapeHtml(round.body)}</p>
      </div>
      <div class="soft-panel">
        <strong>${escapeHtml(caseFile.nodeTitle)}</strong>
        <p class="muted">${escapeHtml(caseFile.nodeBody)}</p>
        ${caseFile.selectedConsultantName ? `<p><strong>${escapeHtml(caseFile.selectedConsultantName)}</strong>: ${escapeHtml(caseFile.selectedConsultantPrompt)}</p>` : ""}
        <p class="tiny">Case totals: $${Number(caseFile.totals.sales).toFixed(0)} · Sat ${caseFile.totals.satisfaction >= 0 ? "+" : ""}${caseFile.totals.satisfaction} · Rep ${caseFile.totals.reputation >= 0 ? "+" : ""}${caseFile.totals.reputation}</p>
        <div class="choice-list">${buttonHtml}</div>
      </div>
      <div class="timeline">
        ${caseFile.timeline.map((item) => `
          <div class="timeline-item">
            <strong>${escapeHtml(item.label)}</strong>
            <div class="tiny">${escapeHtml(item.summary)}</div>
          </div>
        `).join("")}
      </div>
    `;
  }

  function renderLeaderboard() {
    refs.leaderboard.innerHTML = `<div class="leaderboard">${
      (state.data.leaderboard || []).map((entry, index) => `
        <div class="leader-row">
          <div>
            <strong>${index + 1}. ${escapeHtml(entry.displayName)}</strong>
            <span class="tiny">Team health ${entry.teamHealth}</span>
          </div>
          <div class="leader-stats">
            <div>$${entry.sales.toFixed(0)}</div>
            <div>Sat ${entry.satisfaction} · Rep ${entry.reputation}</div>
          </div>
        </div>
      `).join("")
    }</div>`;
  }

  function shouldPauseRefresh() {
    const active = document.activeElement;
    if (!active) {
      return false;
    }
    return ["INPUT", "TEXTAREA", "SELECT"].includes(active.tagName);
  }

  function normalizeUsername(value) {
    return String(value || "").trim().toLowerCase().replace(/[^a-z0-9_-]/g, "");
  }

  function escapeHtml(value) {
    return String(value || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function showToast(message) {
    refs.toast.textContent = message;
    refs.toast.classList.remove("hidden");
    window.clearTimeout(showToast.timer);
    showToast.timer = window.setTimeout(() => {
      refs.toast.classList.add("hidden");
    }, 3200);
  }
</script>
