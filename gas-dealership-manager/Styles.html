<style>
  :root {
    --bg: #f4efe6;
    --panel: #fffaf1;
    --soft: #f0e6d5;
    --ink: #1f2a2c;
    --muted: #5d696b;
    --line: #d8ccb6;
    --accent: #8d4d2f;
    --accent-2: #1f6f78;
    --success: #2f7c48;
    --danger: #a6402d;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: Georgia, "Times New Roman", serif;
    background: linear-gradient(180deg, #f8f2e8 0%, var(--bg) 100%);
    color: var(--ink);
  }

  button,
  input,
  textarea,
  select {
    font: inherit;
  }

  .shell {
    max-width: 1180px;
    margin: 0 auto;
    padding: 24px;
  }

  .hero,
  .panel-head,
  .session-bar,
  .leader-row {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
  }

  .eyebrow {
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-size: 12px;
    color: var(--accent);
    margin: 0 0 6px;
  }

  h1,
  h2,
  h3,
  p {
    margin-top: 0;
  }

  .lede,
  .muted {
    color: var(--muted);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 18px;
    margin-top: 18px;
  }

  .card,
  .soft-panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 18px;
    box-shadow: 0 14px 40px rgba(51, 35, 12, 0.08);
  }

  .status-card {
    margin-top: 18px;
  }

  .soft-panel {
    background: var(--soft);
    box-shadow: none;
  }

  .auth-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 14px;
  }

  .teacher-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 14px;
  }

  .stack {
    display: grid;
    gap: 10px;
  }

  input,
  textarea,
  select {
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 10px 12px;
    background: #fffdf8;
    color: var(--ink);
  }

  textarea {
    min-height: 90px;
    resize: vertical;
  }

  button {
    border: 0;
    border-radius: 999px;
    padding: 10px 14px;
    background: var(--accent);
    color: white;
    cursor: pointer;
  }

  button.ghost {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--line);
  }

  button:disabled {
    opacity: 0.55;
    cursor: not-allowed;
  }

  .hidden {
    display: none;
  }

  .staff-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin: 14px 0;
  }

  .staff-card {
    border: 1px solid var(--line);
    background: #fffdf8;
    border-radius: 16px;
    padding: 12px;
  }

  .staff-card strong,
  .leader-row strong {
    display: block;
  }

  .tiny {
    font-size: 12px;
    color: var(--muted);
  }

  .choice-list {
    display: grid;
    gap: 8px;
    margin-top: 12px;
  }

  .timeline {
    display: grid;
    gap: 8px;
    margin-top: 14px;
  }

  .timeline-item {
    background: rgba(255, 255, 255, 0.55);
    border-radius: 14px;
    padding: 10px 12px;
  }

  .leaderboard {
    display: grid;
    gap: 10px;
  }

  .mini-list {
    display: grid;
    gap: 10px;
  }

  .mini-card {
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 10px 12px;
    background: rgba(255, 255, 255, 0.55);
  }

  .leader-row {
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 10px 12px;
    background: #fffdf8;
  }

  .leader-stats {
    text-align: right;
    color: var(--muted);
    font-size: 13px;
  }

  .toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--ink);
    color: white;
    padding: 12px 14px;
    border-radius: 14px;
    box-shadow: 0 14px 32px rgba(0, 0, 0, 0.16);
  }

  @media (max-width: 720px) {
    .shell {
      padding: 16px;
    }

    .hero,
    .panel-head,
    .session-bar,
    .leader-row {
      flex-direction: column;
      align-items: flex-start;
    }

    .leader-stats {
      text-align: left;
    }
  }
</style>
